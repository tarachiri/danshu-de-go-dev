const map = L.map('map').setView([35.68, 139.60], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const TODAY    = new Date().toISOString().split('T')[0];
const TOMORROW = new Date(Date.now() + 86400000).toISOString().split('T')[0];
const DAY_AFTER= new Date(Date.now() + 172800000).toISOString().split('T')[0];
// エリアカラー（その他用）。全国展開時は新しい都道府県をここに追加（または動的生成に変更可）
const AREA_COLORS = {
  '東京都':  '#1A5276',
  '埼玉県':  '#1E8449',
  '神奈川県':'#6C3483',
  '山梨県':  '#7D6608',
  '千葉県':  '#6E2C2C',
  // 例: '大阪府': '#E74C3C', '北海道': '#3498DB', ...
};

// 日付ラベル
function getDateLabel(next_date) {
  if (!next_date) return 'none';
  if (next_date === TODAY)     return 'today';
  if (next_date === TOMORROW)  return 'tomorrow';
  if (next_date === DAY_AFTER) return 'dayafter';
  return 'other';
}

// === 新スキーマ対応ヘルパー（meetings配列 + city 対応、全国展開を見据え） ===
function getPrimaryMeeting(v) {
  if (v && v.meetings && v.meetings.length > 0) {
    return v.meetings[0];
  }
  return {};
}

function getEffectiveNextDate(v) {
  const m = getPrimaryMeeting(v);
  return m.next_date || v.next_date || v.meeting_next_date || '';  // legacy fallback
}

function getVenueSearchHaystack(v) {
  const m = getPrimaryMeeting(v);
  return [
    v.facility_name || '',
    v.address || '',
    v.prefecture || '',
    v.city || '',
    m.meeting_name || '',
    m.recurrence || '',
    m.contact_phone || '',
    m.meeting_type || ''
  ].join(' ').toLowerCase();
}


// ピンスタイル
function getStyle(v) {
  const label = getDateLabel(getEffectiveNextDate(v));
  if (label === 'today')    return { color: '#C0392B', size: 28, cls: 'pin-today' };
  if (label === 'tomorrow') return { color: '#D35400', size: 26, cls: '' };
  if (label === 'dayafter') return { color: '#E8857A', size: 21, cls: '' };
  // その他→エリアカラー
  const areaColor = AREA_COLORS[v.prefecture] || '#555';
  return { color: areaColor, size: 15, cls: '' };
}

function makeIcon(v) {
  const s = getStyle(v);
  return L.divIcon({
    html: `<div class="${s.cls}" style="
      width:${s.size}px;height:${s.size}px;
      background:${s.color};
      border:2px solid rgba(255,255,255,0.8);
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      box-shadow:0 2px 6px rgba(0,0,0,0.4);
    "></div>`,
    iconSize: [s.size, s.size],
    iconAnchor: [s.size/2, s.size],
    popupAnchor: [0, -s.size],
    className: ''
  });
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  const label = getDateLabel(d);
  const labelStr = {today:'今日', tomorrow:'明日', dayafter:'明後日'}[label] || '';
  const mm = dt.getMonth()+1;
  const dd = dt.getDate();
  const day = ['日','月','火','水','木','金','土'][dt.getDay()];
  return labelStr ? `${labelStr}（${mm}/${dd} ${day}曜）` : `${mm}/${dd}（${day}曜）`;
}

function buildPopup(v) {
  const m = getPrimaryMeeting(v);
  const next = getEffectiveNextDate(v);
  const label = getDateLabel(next);
  const badgeColors = {
    today: '#C0392B', tomorrow: '#D35400',
    dayafter: '#9A7D0A', other: '#555', none: '#888'
  };
  const badgeTexts = {
    today: '今日開催！', tomorrow: '明日開催', dayafter: '明後日開催',
    other: '開催予定あり', none: '日程未定'
  };
  const typeEmoji = {
    'シングル': '💍', 'アメシスト': '💜', '家族': '👨‍👩‍👧', '相談': '💬', '本部': '🏛️'
  };

  const name = m.meeting_name || v.facility_name || '例会場';
  const facility = v.facility_name || '';
  const building = v.building_name || '';  // legacy
  let addr = v.address || '';
  addr = addr.replace(/^.*〒\d{3}-\d{4}\s*/, '').replace(/,?\s*日本.*$/, '').trim();

  const timeStr = m.start_time ? `${m.start_time}〜${m.end_time || ''}` : '';
  const dateStr = formatDate(next);
  const emoji = typeEmoji[m.meeting_type] || '🍶';
  const rec = m.recurrence || '';
  const phone = m.contact_phone || v.contact_phone || '';  // fallback

  // Googleカレンダーリンク（legacy v.htmlLink も残しつつ、将来は meeting 側に）
  const calLink = v.htmlLink
    ? `<a href="${v.htmlLink}" target="_blank" class="popup-link cal-link">📅 Googleカレンダーで見る</a>`
    : '';

  // Google Maps経路リンク
  const mapsQuery = encodeURIComponent(addr || facility);
  const mapsLink = mapsQuery
    ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${mapsQuery}" target="_blank" class="popup-link map-link">🗺️ 経路を調べる</a>`
    : '';

  const cityLine = v.city ? `<div class="popup-address" style="color:#666;font-size:11px;">🏙️ ${v.city}</div>` : '';

  // --- 要確認ポップアップ（needs_verification = 1）---
  // 電話表示ルール: ユーザー向け問い合わせ先は contact_phone のみ。
  // phone（会場電話）は地図リンク生成等の内部用途専用。ポップアップには出さない。
  let verifyNotice = '';
  if (Number(v.needs_verification) === 1) {
    const url = v.official_url || '';
    const isAozora = (m.meeting_name === 'あおぞら例会') || (name === 'あおぞら例会');
    const msg = isAozora
      ? 'この例会は季節や天候により開催地が変わる場合があります。'
      : 'この例会の日程は変更になる場合があります。';
    const urlLine = url
      ? `<a href="${url}" target="_blank" rel="noopener" class="verify-link">${url}</a>`
      : '';
    verifyNotice = `<div class="popup-verify">⚠️ ${msg}<br>公式サイトでご確認ください。${urlLine ? '<br>' + urlLine : ''}</div>`;
  }

  return `
    <div class="popup-box">
      <span class="popup-badge" style="background:${badgeColors[label]}">${badgeTexts[label]}</span>
      <div class="popup-name">${emoji} ${name}</div>
      ${facility && facility !== name ? `<div class="popup-facility">🏢 ${facility}${building ? ' ' + building : ''}</div>` : ''}
      ${addr ? `<div class="popup-address">📍 ${addr}</div>` : ''}
      ${cityLine}
      ${dateStr ? `<div class="popup-date" style="color:${badgeColors[label]}">📅 ${dateStr} ${timeStr}</div>` : ''}
      ${rec ? `<div class="popup-recurrence">🔁 ${rec}</div>` : ''}
      ${phone ? `<div class="popup-phone">📞 ${phone}</div>` : ''}
      ${verifyNotice}
      <div class="popup-links">
        ${calLink}
        ${mapsLink}
      </div>
    </div>
  `;
}

let VENUES = [];
let lastVenuesMeta = null;
// === データ分離のポイント（CLAUDE.md / 将来全国展開対応） ===
// - 会場データは外部 venues.json に分離（index.html から巨大ハードコードを完全排除）
// - index.html は fetch で読み込むだけ。データ更新は enrich_venues.py が SQLite から生成 → venues.json をコミット
// - 形式: 生配列 または { meta: {...}, venues: [...] } どちらもサポート
// - GitHub Pages 静的配信前提: 相対パス fetch でOK。データ更新時は venues.json をコミットするだけで反映。
// - スケーラビリティ: 数千件でも静的配信で十分（gzip後 ~数百KB想定）。将来的に地域分割や indexedDB キャッシュも検討可。

function setLoadingState() {
  const totalEl = document.getElementById("count-total");
  if (totalEl) totalEl.textContent = "読込中...";
  const bar = document.getElementById("count-bar");
  if (bar) bar.innerHTML = "会場データを読み込んでいます...";
}

function updateLastUpdatedUI() {
  // GitHub Pages デプロイでも役立つよう、meta の generated_at を軽く表示
  const totalEl = document.getElementById("count-total");
  if (totalEl && lastVenuesMeta && lastVenuesMeta.generated_at) {
    const date = lastVenuesMeta.generated_at;
    // 短く表示（ツールチップで詳細）
    totalEl.title = `データ最終更新: ${date} (enrich_venues.py 生成)`;
    // 必要ならテキストに追記（スペース節約のため title のみ）
  }
}

async function loadVenues() {
  setLoadingState();
  try {
    const res = await fetch("./venues.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    // Support both plain array or { meta, venues: [...] }
    let loadedMeta = null;
    if (Array.isArray(data)) {
      VENUES = data;
    } else if (data && Array.isArray(data.venues)) {
      VENUES = data.venues;
      loadedMeta = data.meta || null;
    } else {
      VENUES = [];
    }
    if (loadedMeta) {
      lastVenuesMeta = loadedMeta;
      console.log("[venues] loaded meta:", loadedMeta);
    }
    populateAreaOptions();
    applyFilters();
    updateLastUpdatedUI();
    // Leaflet needs this when container size is set after init (flex layout)
    setTimeout(() => { if (typeof map !== 'undefined' && map) map.invalidateSize(); }, 100);
  } catch (e) {
    console.error("venues.json load error:", e);
    const bar = document.getElementById("count-bar");
    if (bar) bar.textContent = "会場データの読み込みに失敗 (venues.json を確認してください)";
    // 空データで apply してUIをクリア状態に
    lastVenuesMeta = null;
    VENUES = [];
    populateAreaOptions();
    applyFilters();
    updateLastUpdatedUI();
    setTimeout(() => { if (typeof map !== 'undefined' && map) map.invalidateSize(); }, 100);
  }

function populateAreaOptions() {
  const sel = document.getElementById("area-filter");
  if (!sel) return;
  const prev = sel.value || "all";
  while (sel.options.length > 1) sel.remove(1);
  const prefs = [...new Set(VENUES.map(v => v.prefecture).filter(Boolean))].sort();
  prefs.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    let label = p;
    if (p === '東京都' || p === '大阪府' || p === '京都府') {
      label = p.replace(/[都府]$/, '');
    } else if (p === '北海道') {
      label = '北海道';
    } else {
      label = p.replace(/[都道府県]$/, '');
    }
    opt.textContent = label;
    sel.appendChild(opt);
  });
  if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}

function clearSearch() {
  const inp = document.getElementById("search-input");
  if (inp) {
    inp.value = "";
    applyFilters();
  }
}

function applyFilters() {
  const dateFilter = document.getElementById("date-filter").value;
  const areaFilter = document.getElementById("area-filter").value;
  const searchInput = document.getElementById("search-input");
  const q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : "";

  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers = [];

  let count = 0;
  VENUES.forEach(v => {
    if (!v.lat || !v.lng) return;

    const effDate = getEffectiveNextDate(v);
    const label = getDateLabel(effDate);

    if (currentMode === "comfort" && label === "none") return;
    if (currentMode === "comfort" && label === "other") return;

    if (dateFilter !== "all" && label !== dateFilter) return;

    if (areaFilter !== "all" && v.prefecture !== areaFilter) return;

    if (q) {
      const haystack = getVenueSearchHaystack(v);
      const terms = q.split(/\s+/).filter(Boolean);
      if (!terms.every(t => haystack.indexOf(t) !== -1)) return;
    }

    const marker = L.marker([v.lat, v.lng], { icon: makeIcon(v) })
      .bindPopup(buildPopup(v), { maxWidth: 300 });

    marker.addTo(map);
    allMarkers.push(marker);
    count++;
  });

  const todayCount = VENUES.filter(v => getDateLabel(getEffectiveNextDate(v)) === "today").length;
  const tomorrowCount = VENUES.filter(v => getDateLabel(getEffectiveNextDate(v)) === "tomorrow").length;
  const dayafterCount = VENUES.filter(v => getDateLabel(getEffectiveNextDate(v)) === "dayafter").length;
  document.getElementById("count-today").textContent = todayCount;
  document.getElementById("count-tomorrow").textContent = tomorrowCount;
  document.getElementById("count-dayafter").textContent = dayafterCount;
  const total = VENUES.length;
  document.getElementById("count-total").textContent = `全${total}件中${count}件`;

  document.getElementById("count-bar").innerHTML =
    `全${total}件中${count}件表示 <span style="color:#C0392B">●</span>${todayCount} <span style="color:#D35400">●</span>${tomorrowCount} <span style="color:#E8857A">●</span>${dayafterCount}`;
}

let allMarkers = [];
let currentMode = 'comfort';

function toggleMode() {
  currentMode = currentMode === 'comfort' ? 'explore' : 'comfort';
  const btn = document.getElementById('mode-toggle-float');
  if (btn) {
    btn.innerHTML = currentMode === 'comfort' ? '<b>快適モード</b>' : '<b>探索モード</b>';
    btn.style.background = currentMode === 'explore' ? '#1a5276' : '#C0392B';
  }
  if (typeof applyFilters === 'function') applyFilters();
}

      <div style="font-size:14px;line-height:2;color:#ccc;">

        ② <b style="color:#fff;">「ホーム画面に追加」</b> を選択<br>

      </div>

    `;
  } else if(isAndroid){
    modal.innerHTML = `
      <div style="font-size:16px;font-weight:bold;color:#e94560;margin-bottom:12px;">📲 ホーム画面に追加しよう！</div>
      <div style="font-size:14px;line-height:2;color:#ccc;">
        ① ブラウザ右上の <b style="color:#fff;">メニュー（⋮）</b> をタップ<br>
        ② <b style="color:#fff;">「ホーム画面に追加」</b> を選択
      </div>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="margin-top:16px;width:100%;padding:12px;background:#C0392B;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;">閉じる</button>
    `;
  } else {
    modal.innerHTML = `

      <div style="font-size:14px;color:#ccc;">スマートフォンでアクセスしてホーム画面に追加してください！</div>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="margin-top:16px;width:100%;padding:12px;background:#C0392B;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;">閉じる</button>
    `;
  }
  overlay.appendChild(modal);
  overlay.onclick = function(e) { if(e.target === overlay) overlay.remove(); };

if(!window.matchMedia('(display-mode: standalone)').matches){
  const btn = document.createElement('button');
  btn.id = 'mode-toggle-float';
  btn.innerHTML = '<b>探索モード</b>';
  btn.style.cssText = `
    position:fixed;
    bottom:24px;
    right:16px;
    background:#C0392B;
    color:#fff;
    border:none;
    border-radius:24px;
    padding:10px 18px;
    font-size:13px;
    font-weight:bold;
    cursor:pointer;
    z-index:9999;
    box-shadow:0 4px 16px rgba(0,0,0,0.5);
  `;
  btn.onclick = function() {
    toggleMode();
    const isExplore = btn.innerHTML.includes('探索');
    if(isExplore) {
      btn.innerHTML = '🗺️ 快適モード';
      btn.style.background = '#27AE60';
    } else {
      btn.innerHTML = '<b>探索モード</b>';
      btn.style.background = '#C0392B';
    }
  };
  document.body.appendChild(btn);
}

const SITE_URL = 'https://dansyu-go.nukadokonokai.com';
const SITE_TEXT = 
'🏃断酒でGO！今日・明日の断酒例会場をすぐ探せるマップ\n';

function copyShareUrl() {
  navigator.clipboard.writeText(SITE_TEXT + SITE_URL).then(() => {
    const btn = document.getElementById('share-copy');
    btn.textContent = '✅コピー完了';
    setTimeout(() => btn.textContent = '📋リンクコピー', 1500);
  });
}

function openShareBar() {
  const t = encodeURIComponent(SITE_TEXT + SITE_URL);
  const u = encodeURIComponent(SITE_URL);
  const sx = document.getElementById('share-x');
  const sl = document.getElementById('share-line');
  const sf = document.getElementById('share-fb');
  if (sx) sx.onclick = () => window.open(`https://twitter.com/intent/tweet?text=${t}`, '_blank');
  if (sl) sl.onclick = () => window.open(`https://line.me/R/share?text=${encodeURIComponent(SITE_TEXT + SITE_URL)}`, '_blank');
  if (sf) sf.onclick = () => window.open(`https://www.facebook.com/sharer/sharer.php?u=${u}`, '_blank');
}

function closeShareBar() {
  // The share-panel is a sliding overlay; for now just hide via transform if present
  const panel = document.getElementById('share-panel');
  if (panel) panel.style.transform = 'translateX(100%)';
}

openShareBar();

loadVenues();
